name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        pylint --errors-only --disable=import-error,no-member,no-name-in-module \
          setup/src/cabal \
          setup/tests \
          tests/unit \
          tests/integration \
          tests/contract \
          global/hooks
